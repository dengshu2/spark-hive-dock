# ============================================================
# Spark Defaults Configuration
# - Hive Metastore integration
# - HDFS warehouse
# - Kerberos authentication
# ============================================================

spark.master                            spark://spark-master:7077
spark.sql.warehouse.dir                 hdfs://namenode.hive-net:9000/user/hive/warehouse
spark.hadoop.hive.metastore.uris        thrift://hive-metastore.hive-net:9083
spark.sql.catalogImplementation         hive
spark.serializer                        org.apache.spark.serializer.KryoSerializer

# Kerberos credentials
spark.kerberos.principal                spark/spark-master.hive-net@EXAMPLE.COM
spark.kerberos.keytab                   /etc/security/keytabs/spark.keytab

# Performance defaults for Docker environment
spark.driver.memory                     1g
spark.executor.memory                   1g
spark.sql.adaptive.enabled              true
spark.sql.adaptive.coalescePartitions.enabled true
