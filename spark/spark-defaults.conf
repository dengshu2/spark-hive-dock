# ============================================================
# Spark Defaults Configuration
# - YARN mode with Kerberos delegation token support
# - Hive Metastore integration via HDFS warehouse
# ============================================================

spark.master                            yarn
spark.submit.deployMode                 client
spark.sql.warehouse.dir                 hdfs://namenode.hive-net:9000/user/hive/warehouse
spark.hadoop.hive.metastore.uris        thrift://hive-metastore.hive-net:9083
spark.sql.catalogImplementation         hive
spark.serializer                        org.apache.spark.serializer.KryoSerializer

# Kerberos credentials
spark.kerberos.principal                spark/spark-thrift.hive-net@EXAMPLE.COM
spark.kerberos.keytab                   /etc/security/keytabs/spark.keytab

# YARN delegation token for HDFS — the key fix for Kerberos!
# This tells Spark to obtain HDFS delegation tokens and distribute
# them to Executor containers running on YARN NodeManagers.
spark.kerberos.access.hadoopFileSystems hdfs://namenode.hive-net:9000

# YARN staging dir: /user/<user> requires hdfs write permission on /user.
# Use /tmp (chmod 777) to avoid needing special HDFS user directories.
spark.yarn.stagingDir                   hdfs://namenode.hive-net:9000/tmp/spark-staging

# YARN resource allocation (Docker dev environment)
spark.executor.instances                1
spark.executor.memory                   512m
spark.driver.memory                     1g
spark.yarn.am.memory                    512m
spark.sql.adaptive.enabled              true
spark.sql.adaptive.coalescePartitions.enabled true
