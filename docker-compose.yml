# ============================================================
# Docker Compose - spark-hive-dock (Kerberized + YARN)
#
# Spark SQL cluster with Hive Metastore on Hadoop HDFS,
# secured with MIT Kerberos authentication.
# YARN provides resource management and Kerberos delegation
# token distribution to Spark executors.
#
# Services:
#   - kdc             : MIT Kerberos KDC (authentication center)
#   - mysql           : Metastore backend (MySQL 8.0)
#   - namenode        : HDFS NameNode + YARN ResourceManager
#   - datanode        : HDFS DataNode + YARN NodeManager
#   - hive-metastore  : Hive Metastore Service (metadata only)
#   - spark-thrift    : Spark Thrift Server (JDBC, YARN client)
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f spark-thrift
#   docker compose down -v   (destroy volumes)
# ============================================================

services:

  # --------------------------------------------------------
  # KDC - MIT Kerberos Key Distribution Center
  # --------------------------------------------------------
  kdc:
    build:
      context: ./kdc
    image: kdc:latest
    container_name: kdc
    hostname: kdc
    domainname: hive-net
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      KRB5_REALM: ${KRB5_REALM:-EXAMPLE.COM}
      KRB5_KDC_PASSWORD: ${KRB5_KDC_PASSWORD:-kdc_admin_2024}
    volumes:
      - keytabs:/etc/security/keytabs
    healthcheck:
      test: ["CMD-SHELL", "test -f /etc/security/keytabs/.kdc-ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - hive-net
    restart: unless-stopped

  # --------------------------------------------------------
  # MySQL - Hive Metastore Backend
  # --------------------------------------------------------
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: mysql
    hostname: mysql
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hive_metastore}
      MYSQL_USER: ${MYSQL_USER:-hive}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hive2024}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - hive-net
    restart: unless-stopped

  # --------------------------------------------------------
  # HDFS NameNode + YARN ResourceManager
  # --------------------------------------------------------
  namenode:
    build:
      context: ./hadoop
      args:
        HADOOP_VERSION: ${HADOOP_VERSION:-3.3.6}
    image: hadoop-base:${HADOOP_VERSION:-3.3.6}
    container_name: namenode
    hostname: namenode
    domainname: hive-net
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      HADOOP_ROLE: namenode
    ports:
      - "127.0.0.1:9870:9870"   # HDFS Web UI
      - "127.0.0.1:19000:9000"  # HDFS RPC (remapped to avoid host conflict)
      - "127.0.0.1:8088:8088"   # YARN ResourceManager Web UI
    volumes:
      - namenode-data:/data/namenode
      - keytabs:/etc/security/keytabs:ro
      - ./kdc/krb5.conf:/etc/krb5.conf:ro
    depends_on:
      kdc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 && nc -z localhost 8032"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1536M
    networks:
      - hive-net
    restart: unless-stopped

  # --------------------------------------------------------
  # HDFS DataNode + YARN NodeManager
  # --------------------------------------------------------
  datanode:
    image: hadoop-base:${HADOOP_VERSION:-3.3.6}
    container_name: datanode
    hostname: datanode
    domainname: hive-net
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      HADOOP_ROLE: datanode
    ports:
      - "127.0.0.1:9864:9864"   # HDFS DataNode Web UI
      - "127.0.0.1:8042:8042"   # YARN NodeManager Web UI
    volumes:
      - datanode-data:/data/datanode
      - keytabs:/etc/security/keytabs:ro
      - ./kdc/krb5.conf:/etc/krb5.conf:ro
    depends_on:
      kdc:
        condition: service_healthy
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://datanode:9864/jmx && PORT_HEX=$$(printf '%X' 8042); grep -q \":$${PORT_HEX} \" /proc/net/tcp6 2>/dev/null || grep -q \":$${PORT_HEX} \" /proc/net/tcp 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3g
    networks:
      - hive-net
    restart: unless-stopped

  # --------------------------------------------------------
  # Hive Metastore (metadata service only)
  # --------------------------------------------------------
  hive-metastore:
    build:
      context: ./hive
      args:
        HIVE_VERSION: ${HIVE_VERSION:-3.1.3}
    image: hive-metastore:${HIVE_VERSION:-3.1.3}
    container_name: hive-metastore
    hostname: hive-metastore
    domainname: hive-net
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hive_metastore}
      MYSQL_USER: ${MYSQL_USER:-hive}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hive2024}
    ports:
      - "127.0.0.1:9083:9083"   # Thrift Metastore
    volumes:
      - keytabs:/etc/security/keytabs:ro
      - ./kdc/krb5.conf:/etc/krb5.conf:ro
    depends_on:
      kdc:
        condition: service_healthy
      mysql:
        condition: service_healthy
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PORT_HEX=$$(printf '%X' 9083); grep -q \":$${PORT_HEX} \" /proc/net/tcp6 2>/dev/null || grep -q \":$${PORT_HEX} \" /proc/net/tcp 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - hive-net
    restart: unless-stopped

  # --------------------------------------------------------
  # Spark Thrift Server (YARN client mode)
  # --------------------------------------------------------
  spark-thrift:
    build:
      context: ./spark
      args:
        SPARK_VERSION: ${SPARK_VERSION:-3.5.3}
    image: spark:${SPARK_VERSION:-3.5.3}
    container_name: spark-thrift
    hostname: spark-thrift
    domainname: hive-net
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:10000:10000" # Thrift Server (JDBC)
      - "127.0.0.1:4040:4040"   # Spark Application UI
    volumes:
      - keytabs:/etc/security/keytabs:ro
      - ./kdc/krb5.conf:/etc/krb5.conf:ro
    depends_on:
      kdc:
        condition: service_healthy
      namenode:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PORT_HEX=$$(printf '%X' 10000); grep -q \":$${PORT_HEX} \" /proc/net/tcp6 2>/dev/null || grep -q \":$${PORT_HEX} \" /proc/net/tcp 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - hive-net
    restart: unless-stopped

# ============================================================
# Volumes
# ============================================================
volumes:
  mysql-data:
    driver: local
  namenode-data:
    driver: local
  datanode-data:
    driver: local
  keytabs:
    driver: local

# ============================================================
# Network
# ============================================================
networks:
  hive-net:
    driver: bridge
    name: hive-net
